<div class="auth-page">
  <div class="auth-logo">
    <div class="logo-wrap"><img src="assets/logo-knl.png" alt="Kaaÿ ñiaw lú" class="logo-img"/></div>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Se Connecter</h1>
    <div class="role-selector">
      <label class="role-option"><input type="radio" name="role_display" value="tailleur"/><span>Je suis tailleur</span></label>
      <label class="role-option"><input type="radio" name="role_display" value="client" checked/><span>Je suis client</span></label>
    </div>
    @if (erreur()) { <div class="alert-erreur">{{ erreur() }}</div> }
    <form [formGroup]="form" (ngSubmit)="soumettre()">
      <div class="champ">
        <input type="tel" formControlName="telephone" placeholder="Numéro de téléphone" class="input-knl" [class.input-erreur]="tel.invalid && tel.touched"/>
        @if (tel.invalid && tel.touched) { <span class="msg-erreur">Numéro obligatoire.</span> }
      </div>
      <div class="champ">
        <input [type]="motDePasseVisible() ? 'text' : 'password'" formControlName="password" placeholder="Mot de passe" class="input-knl" [class.input-erreur]="mdp.invalid && mdp.touched"/>
        @if (mdp.invalid && mdp.touched) { <span class="msg-erreur">Mot de passe obligatoire.</span> }
      </div>
      <button type="submit" class="btn-primary" [disabled]="chargement()">
        @if (chargement()) { Connexion en cours... } @else { Connexion }
      </button>
    </form>
    <p class="auth-link">Vous n'avez pas de compte ? <a routerLink="/inscription">Inscrivez-vous</a></p>
  </div>
</div>
<style>
  .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:4rem;background:#fff;padding:2rem;}
  .logo-wrap{background:#000;border-radius:20px;padding:12px;display:flex;align-items:center;justify-content:center;}
  .logo-img{width:200px;height:auto;display:block;}
  .auth-card{border:2px solid #C9A84C;border-radius:16px;padding:2.5rem;width:420px;}
  .auth-title{color:#C9A84C;text-align:center;font-size:1.8rem;margin-bottom:1.5rem;}
  .role-selector{display:flex;justify-content:space-around;margin-bottom:1.5rem;}
  .role-option{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .role-option input{accent-color:#C9A84C;}
  .champ{margin-bottom:1rem;}
  .input-knl{width:100%;padding:12px 16px;border:1.5px solid #C9A84C;border-radius:30px;outline:none;font-size:1rem;box-sizing:border-box;}
  .input-erreur{border-color:#dc2626 !important;}
  .msg-erreur{color:#dc2626;font-size:0.8rem;padding-left:12px;}
  .alert-erreur{background:#fef2f2;border:1px solid #dc2626;color:#dc2626;padding:10px 16px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;}
  .btn-primary{width:100%;padding:14px;background:#C9A84C;color:#000;border:none;border-radius:30px;font-size:1.1rem;font-weight:600;cursor:pointer;margin-top:0.5rem;}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .auth-link{text-align:center;margin-top:1.5rem;color:#555;}
  .auth-link a{color:#C9A84C;font-weight:600;text-decoration:underline;}
</style>

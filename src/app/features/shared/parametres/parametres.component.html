<div style="padding:24px 32px;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h1 style="font-size:1.6rem;font-weight:700;">PARAMETRES</h1><span>🔔 👤</span>
  </div>
  <hr style="border-color:#C9A84C;margin:12px 0 24px;"/>
  <div class="card">
    <h2 class="card-title">🔒 Sécurité</h2>
    <div class="btn-row">
      <button class="btn-gold">Changer le mot de passe</button>
      <button class="btn-gold" (click)="confirmer.set(true)">Supprimer mon compte</button>
    </div>
    @if(confirmer()){
      <div class="confirm-box">⚠️ Action irréversible. Êtes-vous sûr ?
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn-outline" (click)="confirmer.set(false)">Annuler</button>
          <button class="btn-gold">Confirmer</button>
        </div>
      </div>
    }
  </div>
  <div class="card">
    <h2 class="card-title">⚙️ Préférences</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div><label class="lbl">Langue</label><select class="sel"><option>Français</option><option>Wolof</option></select></div>
      <div><label class="lbl">Mode</label><select class="sel"><option>Clair</option><option>Sombre</option></select></div>
    </div>
  </div>
  <div class="card">
    <h2 class="card-title">🎧 Assistance</h2>
    <div class="btn-row">
      <button class="btn-outline">📞 Nous Contacter</button>
      <button class="btn-outline">📍 Notre Siège</button>
    </div>
  </div>
</div>
<style>
  .card{border:1.5px solid #C9A84C;border-radius:16px;padding:24px;margin-bottom:20px;}
  .card-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;}
  .btn-gold{padding:12px 24px;background:#C9A84C;color:#000;border:none;border-radius:30px;font-size:0.9rem;font-weight:600;cursor:pointer;}
  .btn-outline{padding:12px 24px;background:white;border:1.5px solid #C9A84C;border-radius:30px;font-size:0.9rem;cursor:pointer;}
  .confirm-box{background:#fef9ec;border:1px solid #C9A84C;border-radius:10px;padding:16px;margin-top:16px;font-size:0.9rem;}
  .lbl{display:block;font-weight:600;font-size:0.85rem;margin-bottom:8px;}
  .sel{width:100%;padding:12px 16px;border:1.5px solid #C9A84C;border-radius:30px;outline:none;background:white;}
</style>

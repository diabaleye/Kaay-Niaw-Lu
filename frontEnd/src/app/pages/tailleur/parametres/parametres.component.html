<div class="dashboard-layout gold-border">
  <app-sidebar-tailor />
  <main class="dashboard-main">
    <app-dashboard-header title="PARAMETRES" />

    <section class="settings-section gold-border">
      <h2 class="settings-title"><span>🔒</span> Sécurité</h2>
      <div class="settings-actions">
        <button class="btn-gold">Changer le mot de passe</button>
        <button class="btn-gold">Supprimer mon compte</button>
      </div>
    </section>

    <section class="settings-section gold-border">
      <h2 class="settings-title"><span>📱</span> Préférences</h2>
      <div class="settings-row">
        <div class="form-group">
          <label>Langue</label>
          <select><option>Francais</option></select>
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select><option>Clair</option></select>
        </div>
      </div>
    </section>

    <section class="settings-section gold-border">
      <h2 class="settings-title"><span>🎧</span> Assistance</h2>
      <div class="settings-actions outline">
        <button class="btn-outline-gold">📞 Nous Contacter</button>
        <button class="btn-outline-gold">📍 Notre Siège</button>
      </div>
    </section>
  </main>
</div>

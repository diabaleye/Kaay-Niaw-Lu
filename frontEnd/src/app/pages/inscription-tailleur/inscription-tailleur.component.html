<app-auth-layout backLink="/inscription">
  <div class="register-form gold-border">
    <h2 class="form-title serif gold-text">S'inscrire</h2>
    <form (ngSubmit)="onRegister()">
      <p class="form-section-title">1. Nom complet</p>
      <div class="form-row">
        <input type="text" placeholder="Prénom" [(ngModel)]="form.prenom" name="prenom" required />
        <input type="text" placeholder="Nom" [(ngModel)]="form.nom" name="nom" required />
      </div>

      <p class="form-section-title">2. Vos identifiants</p>
      <div class="form-group">
        <input type="email" placeholder="Adresse mail" [(ngModel)]="form.email" name="email" required />
      </div>
      <div class="form-row">
        <input type="text" placeholder="Pseudo" [(ngModel)]="form.pseudo" name="pseudo" required />
        <input type="tel" placeholder="Téléphone" [(ngModel)]="form.telephone" name="telephone" required />
      </div>
      <div class="form-row">
        <input type="password" placeholder="Mot de passe" [(ngModel)]="form.password" name="password" required />
        <input type="password" placeholder="Confirmation" [(ngModel)]="form.password_confirmation" name="password_confirmation" required />
      </div>

      <p class="form-section-title">3. Informations tailleur</p>
      <div class="form-group">
        <input type="text" placeholder="Nom de l'atelier" [(ngModel)]="form.workshop_name" name="workshop_name" required />
      </div>
      <div class="form-group">
        <input type="text" placeholder="Localisation" [(ngModel)]="form.location" name="location" required />
      </div>
      <div class="form-group">
        <select [(ngModel)]="form.specialties" name="specialties">
          <option value="">Spécialités</option>
          <option value="grands_boubous">Grands boubous</option>
          <option value="kaftans">Kaftans et robes</option>
          <option value="tuniques">Tuniques modernes</option>
        </select>
      </div>

      <p class="form-section-title">4. Paramètres de Gestion &amp; Capacité</p>
      <div class="form-group">
        <input type="number" placeholder="Commandes maximales par semaine" [(ngModel)]="form.max_orders" name="max_orders" />
      </div>
      <div class="form-group">
        <input type="text" placeholder="Délai moyen de confection" [(ngModel)]="form.avg_production_time" name="avg_production_time" />
      </div>

      <button type="submit" class="btn-gold btn-full">S'inscrire</button>
    </form>
    <p class="form-footer">
      Déjà un compte?
      <a routerLink="/connexion" class="link-bold">Se connecter</a>
    </p>
  </div>
</app-auth-layout>
